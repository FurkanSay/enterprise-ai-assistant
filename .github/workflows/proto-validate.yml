name: proto-validate

on:
  pull_request:
    paths:
      - 'protos/**'
      - '.github/workflows/proto-validate.yml'
  push:
    branches: [main]
    paths:
      - 'protos/**'

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: buf lint
        working-directory: protos
        run: buf lint

      - name: buf format check
        working-directory: protos
        run: buf format -d --exit-code

      - name: buf breaking-change (vs main)
        if: github.event_name == 'pull_request'
        working-directory: protos
        run: buf breaking --against "../.git#branch=main,subdir=protos"
