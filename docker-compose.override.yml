# Development-time overrides — automatically merged with docker-compose.yml.
# Use this for: live-reload mounts, debug ports, faster iteration.
# Production deployments should ignore this file (or use docker-compose.prod.yml).

services:
  gateway:
    volumes:
      - ./services/gateway/src:/app/src
    environment:
      ASPNETCORE_DETAILEDERRORS: "true"

  identity:
    volumes:
      - ./services/identity/src:/app/src
    environment:
      ASPNETCORE_DETAILEDERRORS: "true"

  documents:
    volumes:
      - ./services/documents/src:/app/src
      - documents_maven_cache:/root/.m2

  # processing has no dev mount — the alpine runtime image only carries the
  # statically-linked binary at /app/processing-server. Bind-mounting the
  # host's services/processing tree over /app hid that binary and caused
  # `exec: no such file or directory` for hours.

  aiengine:
    volumes:
      - ./services/aiengine/src:/app/src
      - ./services/aiengine/tests:/app/tests
    environment:
      LOG_LEVEL: debug
      # FastAPI auto-reload on code change
      UVICORN_RELOAD: "true"

  realtime:
    volumes:
      - ./services/realtime/src:/app/src
      - realtime_node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  # frontend has no dev mount — Phase H replaced the nginx static
  # placeholder with a real Next.js standalone build. Bind-mounting
  # ./frontend over /app hides the built server.js (same gotcha that
  # bit processing earlier). Use `npm run dev` directly on the host
  # for live-reload during frontend work; the container always runs
  # the production build.

volumes:
  documents_maven_cache:
  realtime_node_modules:
