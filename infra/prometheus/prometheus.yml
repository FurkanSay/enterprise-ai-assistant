global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: kai-dev

scrape_configs:
  # OTel collector exports app metrics here
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # Direct app scrapes (if a service exposes /metrics natively)
  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'identity'
    metrics_path: /metrics
    static_configs:
      - targets: ['identity:8081']

  - job_name: 'documents'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['documents:8082']

  - job_name: 'aiengine'
    metrics_path: /metrics
    static_configs:
      - targets: ['aiengine:8084']

  - job_name: 'realtime'
    metrics_path: /metrics
    static_configs:
      - targets: ['realtime:8085']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
