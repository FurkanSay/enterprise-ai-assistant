[project]
name = "kai-protos"
version = "0.0.0"
description = "Generated gRPC + protobuf stubs for the Enterprise AI Assistant platform"
requires-python = ">=3.12"

# These are the runtime libraries the generated *_pb2.py and *_pb2_grpc.py
# files import. Versions are kept in sync with the buf plugins used to
# generate them (see protos/buf.gen.yaml).
dependencies = [
    "protobuf>=5.28.0,<6",
    "grpcio>=1.66.0,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Treat each top-level proto package directory as a Python package.
# buf's protocolbuffers/python plugin emits files like:
#   aiengine/v1/aiengine_pb2.py
#   common/v1/tenant_pb2.py
# These are namespace packages — no __init__.py is required at runtime.
packages = ["aiengine", "common", "documents", "identity", "processing"]

[tool.hatch.build.targets.wheel.sources]
# Source paths are relative to this pyproject.toml.
"aiengine"    = "aiengine"
"common"      = "common"
"documents"   = "documents"
"identity"    = "identity"
"processing"  = "processing"
