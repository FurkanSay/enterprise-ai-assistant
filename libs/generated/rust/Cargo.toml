[package]
name = "kai-protos"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Generated gRPC + protobuf stubs for the Enterprise AI Assistant platform"
publish = false

# This crate is committed under version control and regenerated by
# `make proto`. The .rs files at the crate root are produced by buf;
# lib.rs assembles them into proper Rust modules matching the proto
# package paths.

[lib]
path = "src/lib.rs"

[dependencies]
prost = "0.13"
prost-types = "0.13"
tonic = "0.12"
