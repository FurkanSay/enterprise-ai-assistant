syntax = "proto3";

package aiengine.v1;

import "common/v1/tenant.proto";

// AiEngineService — most AI Engine endpoints are REST/SSE (browser-facing).
// This gRPC service exists for two cases:
//   1. Internal triggers from other services (e.g. background re-embed batch)
//   2. Future: agent-to-agent calls (sub-agent orchestration)
//
// Each RPC owns its request and response message so new fields can be added
// to a single RPC without affecting the others.
service AiEngineService {
  // Trigger embedding for a batch of chunks (called by Processing after chunking).
  rpc EmbedChunks(EmbedChunksRequest) returns (EmbedChunksResponse);

  // Get session metadata (read-only).
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
}

// ─── Domain types ────────────────────────────────────────────────────────

message ChunkToEmbed {
  string chunk_id = 1;
  string text = 2;
  int32 sequence = 3;
  string source_location = 4;
}

message EmbedFailure {
  string chunk_id = 1;
  string error_code = 2;
  string error_message = 3;
}

message Session {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string title = 4;
  string model = 5;
  int32 message_count = 6;
  string created_at = 7;
  string updated_at = 8;
}

// ─── EmbedChunks ─────────────────────────────────────────────────────────

message EmbedChunksRequest {
  common.v1.TenantContext tenant_context = 1;
  string document_id = 2;
  repeated ChunkToEmbed chunks = 3;
  // Embedding model override (defaults to tenant default)
  string model = 4;
}

message EmbedChunksResponse {
  // Number of chunks successfully embedded + written to Qdrant
  int32 embedded_count = 1;
  // Chunks that failed (with error reasons)
  repeated EmbedFailure failures = 2;
  int32 took_ms = 3;
}

// ─── GetSession ──────────────────────────────────────────────────────────

message GetSessionRequest {
  common.v1.TenantContext tenant_context = 1;
  string session_id = 2;
}

message GetSessionResponse {
  Session session = 1;
}
